server:
  port: 8080

spring:
  application:
    name: sparkflow
  datasource:
    url: jdbc:sqlite:${SPARKFLOW_DB_PATH:./sparkflow.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

sparkflow:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  mcp:
    url: ${SPARKFLOW_MCP_URL:}
    enabled: false
